---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: '39.x'
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Expose Traefik on all nodes
    service:
      type: LoadBalancer
      ports:
        web:
          port: 80
          exposedPort: 80
        websecure:
          port: 443
          exposedPort: 443
        mqtt:
          port: 1883
          exposedPort: 1883
          protocol: TCP
        dns:
          port: 53
          exposedPort: 53
          protocol: TCP
    
    # Enable dashboard
    ingressRoute:
      dashboard:
        enabled: true
    
    # Ports configuration
    ports:
      web:
        port: 80
        exposedPort: 80
      websecure:
        port: 443
        exposedPort: 443
      mqtt:
        expose: true
        port: 1883
        exposedPort: 1883
        protocol: TCP
      dns:
        expose: true
        port: 53
        exposedPort: 53
        protocol: TCP
      
    # Enable access logs
    logs:
      access:
        enabled: true
