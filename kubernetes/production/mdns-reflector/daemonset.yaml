---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mdns-reflector
  namespace: mdns-reflector
spec:
  selector:
    matchLabels:
      app: mdns-reflector
  template:
    metadata:
      labels:
        app: mdns-reflector
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: avahi-daemon
        image: alpine:latest
        command:
          - sh
          - -c
          - |
            apk add --no-cache avahi avahi-tools
            # Enable reflector mode
            sed -i 's/#enable-reflector=no/enable-reflector=yes/' /etc/avahi/avahi-daemon.conf
            # Start avahi daemon
            avahi-daemon --no-rlimits
        securityContext:
          privileged: true
          allowPrivilegeEscalation: true
          runAsNonRoot: false
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi
      tolerations:
      - operator: Exists
        effect: NoSchedule
      - operator: Exists
        effect: NoExecute
