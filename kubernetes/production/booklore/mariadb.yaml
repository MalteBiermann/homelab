---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booklore-mariadb
  namespace: books
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/instance: booklore
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mariadb
      app.kubernetes.io/instance: booklore
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/instance: booklore
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.8.3
          env:
            - name: MARIADB_DATABASE
              value: "booklore"
            - name: MARIADB_USER
              value: "booklore-user"
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: booklore-mariadb
                  key: mariadb-password
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: booklore-mariadb
                  key: mariadb-root-password
          ports:
            - containerPort: 3306
              name: mysql
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mariadb-admin ping -h 127.0.0.1 -u root -p"$MARIADB_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mariadb-admin ping -h 127.0.0.1 -u root -p"$MARIADB_ROOT_PASSWORD"
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: booklore-mariadb
---
apiVersion: v1
kind: Service
metadata:
  name: booklore-mariadb
  namespace: books
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/instance: booklore
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
      name: mysql
  selector:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/instance: booklore
