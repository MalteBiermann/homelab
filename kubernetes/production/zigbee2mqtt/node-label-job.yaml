---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-labeler
  namespace: zigbee2mqtt

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-labeler
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-labeler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-labeler
subjects:
- kind: ServiceAccount
  name: node-labeler
  namespace: zigbee2mqtt

---
apiVersion: batch/v1
kind: Job
metadata:
  name: vm-02-labeler
  namespace: zigbee2mqtt
spec:
  template:
    spec:
      serviceAccountName: node-labeler
      containers:
      - name: labeler
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Labeling vm-02 with zigbee=true for Zigbee2MQTT pod scheduling"
          kubectl label nodes vm-02 zigbee=true --overwrite
          echo "Label applied successfully"
      restartPolicy: Never
  backoffLimit: 3
