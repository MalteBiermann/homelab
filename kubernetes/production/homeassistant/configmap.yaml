---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homeassistant-config
  namespace: homeassistant
data:
  configuration.yaml: |
    homeassistant:
      name: Home
      latitude: 52.5
      longitude: 13.4
      unit_system: metric
      time_zone: Europe/Berlin
    
    frontend:

    python_script:
    
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.0.0.0/8
        - 127.0.0.1
        - ::1
    
    mobile_app:
    
    automation: !include automations.yaml
    # script: !include scripts.yaml
    # scene: !include scenes.yaml

    logger:
      default: warning
      logs:
        py.warnings: error
        homeassistant.components.python_script: debug
        homeassistant.components.automation: info
  automations.yaml: |
    - id: shellies_announce
      alias: 'Shellies Announce'
      triggers:
        - trigger: homeassistant
          event: start
        - trigger: time_pattern
          hours: "/1"
      actions:
        - action: mqtt.publish
          data:
            topic: shellies/command
            payload: announce

    - id: 'shellies_discovery'
      alias: 'Shellies Discovery'
      mode: queued
      max: 999
      triggers:
        - trigger: mqtt
          topic: shellies/announce
      conditions:
        - condition: template
          value_template: >-
            {{ trigger.payload_json is defined
               and trigger.payload_json.id is defined
               and trigger.payload_json.ip is defined
               and trigger.payload_json.gen is not defined }}
      actions:
        - action: python_script.shellies_discovery
          data:
            id: '{{ trigger.payload_json.id }}'
            mac: '{{ trigger.payload_json.mac | default("", true) }}'
            fw_ver: '{{ trigger.payload_json.fw_ver | default("", true) }}'
            model: '{{ trigger.payload_json.model | default("", true) }}'
            mode: '{{ trigger.payload_json.mode | default("", true) }}'
            host: '{{ trigger.payload_json.ip }}'
            discovery_prefix: 'homeassistant'
            qos: 2
  # scripts.yaml:
  # scenes.yaml:
