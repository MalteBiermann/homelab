---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app: homeassistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      securityContext:
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: homeassistant
        image: ghcr.io/home-assistant/home-assistant:2026.1.3
        ports:
        - containerPort: 8123
          name: http
          protocol: TCP
        - containerPort: 5353
          name: mdns
          protocol: UDP
        - containerPort: 21063
          name: homekit
          protocol: TCP
        - containerPort: 21064
          name: homekit-alt
          protocol: TCP
        env:
        - name: TZ
          value: Europe/Berlin
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - CHOWN
              - SETGID
              - SETUID
              - DAC_OVERRIDE
              - NET_BIND_SERVICE
          readOnlyRootFilesystem: false
        volumeMounts:
        - name: config
          mountPath: /config
        - name: proxy-config
          mountPath: /config/configuration.yaml
          subPath: configuration.yaml
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 1000m
        livenessProbe:
          httpGet:
            path: /
            port: 8123
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8123
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      - name: avahi-publisher
        image: alpine:latest
        command:
          - sh
          - -c
          - |
            apk add --no-cache avahi avahi-tools dbus curl
            mkdir -p /run/dbus
            dbus-daemon --system --nopidfile --nofork &
            sleep 3
            avahi-daemon --no-rlimits &
            sleep 2
            
            # Wait for Home Assistant to be ready
            echo "Waiting for Home Assistant..."
            for i in $(seq 1 60); do
              if curl -s http://localhost:8123 > /dev/null 2>&1; then
                echo "Home Assistant is ready"
                break
              fi
              sleep 1
            done
            
            sleep 5
            
            # Publish HomeKit service via avahi
            echo "Publishing HomeKit service to mDNS..."
            avahi-publish -s "Home Assistant Bridge" "_hap._tcp" "local" "21063" \
              "md=Home Assistant Bridge" "pv=1.0" "id=DB:88:67:2A:44:19" \
              "c#=1" "s#=1" "ff=0" "sf=1" 2>&1 &
            
            # Keep sidecar running
            wait
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE
          readOnlyRootFilesystem: false
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 200m
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: homeassistant-config
      - name: proxy-config
        configMap:
          name: homeassistant-config
