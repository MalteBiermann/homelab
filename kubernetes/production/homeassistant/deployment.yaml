---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app: homeassistant
    app.kubernetes.io/name: homeassistant
    app.kubernetes.io/instance: homeassistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
        app.kubernetes.io/name: homeassistant
        app.kubernetes.io/instance: homeassistant
    spec:
      securityContext:
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: homeassistant
        image: ghcr.io/home-assistant/home-assistant:2026.3.2
        ports:
        - containerPort: 8123
          name: http
          protocol: TCP
        - containerPort: 5353
          name: mdns
          protocol: UDP
        - containerPort: 21063
          name: homekit
          protocol: TCP
        - containerPort: 21064
          name: homekit-alt
          protocol: TCP
        env:
        - name: TZ
          value: Europe/Berlin
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - CHOWN
              - SETGID
              - SETUID
              - DAC_OVERRIDE
              - NET_BIND_SERVICE
          readOnlyRootFilesystem: false
        volumeMounts:
        - name: config
          mountPath: /config
        - name: proxy-config
          mountPath: /config/configuration.yaml
          subPath: configuration.yaml
        - name: python-scripts
          mountPath: /config/python_scripts
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 1000m
        livenessProbe:
          httpGet:
            path: /
            port: 8123
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8123
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: homeassistant-config
      - name: proxy-config
        configMap:
          name: homeassistant-config
      - name: python-scripts
        configMap:
          name: homeassistant-python-scripts
