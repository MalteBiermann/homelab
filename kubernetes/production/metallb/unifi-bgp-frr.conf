frr version 10.1.2
frr defaults traditional
hostname Dream-Machine-Special-Edition
domainname unifi
log file /var/log/frr/frr.log
log syslog informational
allow-external-route-update
service integrated-vtysh-config
!
! NOTE: On UDM-Pro, ensure bgpd is enabled in /etc/frr/daemons (bgpd=yes)
! so routes are installed into the kernel FIB.
!
router bgp 64501
 bgp router-id 10.0.5.1
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor metallb peer-group
 neighbor metallb remote-as 64500
 neighbor 10.0.5.85 peer-group metallb
 neighbor 10.0.5.86 peer-group metallb
 neighbor 10.0.5.87 peer-group metallb
 !
 address-family ipv4 unicast
  redistribute connected
  neighbor metallb activate
  neighbor metallb next-hop-self
  neighbor metallb soft-reconfiguration inbound
  neighbor metallb route-map ALLOW-ALL in
  neighbor metallb route-map ALLOW-ALL out
 exit-address-family
exit
!
route-map ALLOW-ALL permit 10
exit
!
end
