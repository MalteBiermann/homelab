apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    providers:
      longhorn:
        url: https://longhorn.local.biermann.uk
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/MalteBiermann
        - Biermann:
            - abbr: BM
              href: https://biermann.uk/
  services.yaml: |
    - Cluster:
        - Longhorn:
            href: http://longhorn.local.biermann.uk/
            icon: longhorn
            description: Storage
        - Traefik:
            href: http://traefik.local.biermann.uk/dashboard/
            icon: traefik
            description: Ingress Controller
    - Smart Home:
        - Home Assistant:
            href: http://homeassistant.local.biermann.uk/
            icon: home-assistant
            description: Home Automation
        - Zigbee2MQTT:
            href: http://zigbee2mqtt.local.biermann.uk/
            icon: router
            description: Zigbee Devices
    - Media:
        - Booklore:
            href: http://booklore.local.biermann.uk/
            icon: Booklore
            description: Book Library
        - Shelfmark:
            href: http://shelfmark.local.biermann.uk/
            icon: Shelfmark
            description: Digital Library
        - Streamripper:
            href: http://streamripper-files.local.biermann.uk/
            icon: Substreamer
            description: MP3 Manager
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
