---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: books

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - pvc.yaml
  - mariadb.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: booklore-mariadb
    envs:
      - secret.env
