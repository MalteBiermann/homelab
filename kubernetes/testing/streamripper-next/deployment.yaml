---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamripper-next
  namespace: streamripper-next
  labels:
    app.kubernetes.io/name: streamripper-next
    app.kubernetes.io/instance: streamripper-next
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: streamripper-next
      app.kubernetes.io/instance: streamripper-next
  template:
    metadata:
      labels:
        app.kubernetes.io/name: streamripper-next
        app.kubernetes.io/instance: streamripper-next
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: streamripper-next
          image: ghcr.io/maltebiermann/streamripper-next:20260215
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Berlin
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
              subPath: data
            - name: data
              mountPath: /var/lib/streamripper
              subPath: state
            - name: data
              mountPath: /var/log/streamripper
              subPath: logs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
        - name: file-manager
          image: python:3.11-slim
          workingDir: /app
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            capabilities:
              drop:
              - ALL
          command:
            - sh
            - -c
            - |
              python -m pip install --no-cache-dir --disable-pip-version-check flask -q --target /tmp/pydeps && PYTHONPATH=/tmp/pydeps python file-manager.py
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: app
              mountPath: /app
            - name: data
              mountPath: /data
              subPath: data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: streamripper-next-config
        - name: app
          configMap:
            name: streamripper-next-config
            items:
            - key: file-manager.py
              path: file-manager.py
        - name: data
          persistentVolumeClaim:
            claimName: streamripper-next-data
